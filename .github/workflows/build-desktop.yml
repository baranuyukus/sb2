name: build-desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  actions: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: SneakerBaker-macos-arm64
            archive_path: dist/SneakerBaker-macos-arm64.zip
          - os: windows-latest
            artifact_name: SneakerBaker-windows-x64
            archive_path: dist/SneakerBaker-windows-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Prepare bundled runtime assets
        run: python scripts/prepare_runtime_assets.py

      - name: Build desktop package
        run: python scripts/build_desktop.py

      - name: Archive macOS app
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/SneakerBaker.app ${{ matrix.archive_path }}

      - name: Archive Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/SneakerBaker -DestinationPath ${{ matrix.archive_path }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_path }}

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts from current run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "${{ github.run_id }}" \
            --repo "${{ github.repository }}" \
            --dir release-artifacts

      - name: Prepare release notes
        run: |
          cat <<EOF > release-notes.md
          Automated desktop build for commit \`${{ github.sha }}\`.

          Included assets:
          - macOS build
          - Windows build

          These files are published as GitHub Release assets so they can be downloaded directly from the Releases page.
          EOF

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release delete latest \
              --repo "${{ github.repository }}" \
              --cleanup-tag \
              --yes
          fi

          mapfile -t assets < <(find release-artifacts -type f -name '*.zip' | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          gh release create latest \
            "${assets[@]}" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "Latest Desktop Build" \
            --notes-file release-notes.md \
            --latest
